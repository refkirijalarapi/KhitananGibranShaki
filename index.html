<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Tasyakuran Khitan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* Tambahan CSS sederhana agar tampilan tetap rapi jika nama terlalu panjang */
        .guest-name {
            font-weight: bold;
            font-size: 1.5rem;
            margin-top: 5px;
            color: #fff; /* Sesuaikan dengan desainmu */
        }
    </style>
</head>

<body style="background-color: #49688E;">
    <div class="row col-12 col-sm-12 col-md-12 col-lg-4 col-xl-4 mx-auto">
        
        <div class="atass">
            <img src="./atas.jpg" alt="hiasan" class="atas" data-aos="fade-down" data-aos-duration="3000">
        </div>

        <div class="home" data-aos="zoom-in-up" data-aos-duration="3000">
            <div class="undangan">
                <p>undangan</p>
            </div>
            <div class="title">
                <p>Tasyakuran Khitan</p>
            </div>

            <div class="photo">
                <img src="./child.jpg" alt="Anak" class="child">
            </div>

            <div class="name">
                <p>Muhammad Al Gibran Shaki</p>
            </div>
        </div>

        <div class="invitation-container" data-aos="zoom-in-up" data-aos-duration="3000">
            <div class="invitation-card">
                <p><i>Kepada Yth:</i></p>
                <p class="recipient"><i>Bapak/Ibu/Saudara/i</i></p>
                
                <p class="guest-name" id="nama-tamu">Nama Tamu</p>
                
                <div class="btn-container">
                    <a href="content.html" class="open-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                            class="bi bi-envelope-open" viewBox="0 0 16 16">
                            <path
                                d="M8.47 1.318a1 1 0 0 0-.94 0l-6 3.2A1 1 0 0 0 1 5.4v.817l5.75 3.45L8 8.917l1.25.75L15 6.217V5.4a1 1 0 0 0-.53-.882zM15 7.383l-4.778 2.867L15 13.117zm-.035 6.88L8 10.082l-6.965 4.18A1 1 0 0 0 2 15h12a1 1 0 0 0 .965-.738ZM1 13.116l4.778-2.867L1 7.383v5.734ZM7.059.435a2 2 0 0 1 1.882 0l6 3.2A2 2 0 0 1 16 5.4V14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V5.4a2 2 0 0 1 1.059-1.765z" />
                        </svg>
                        &nbsp; Buka Undangan
                    </a>
                </div>
            </div>
        </div>

        <div class="bawahh">
            <img src="./bawahh.jpg" alt="" class="bawah">
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    // 1. Inisialisasi AOS (Animate On Scroll)
    // Memastikan animasi berjalan saat halaman di-scroll
    AOS.init({
        duration: 1000, // durasi animasi dalam milidetik
        once: true,     // animasi hanya berjalan sekali saat di-scroll
    });

    // 2. Logika Mengambil Nama dari URL
    // Contoh URL: index.html?to=Deni_Priatna
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const namaRaw = urlParams.get('to');

    // Jika parameter 'to' ditemukan di URL
    if (namaRaw) {
        // .replace(/_/g, ' ') akan mencari semua (_) dan menggantinya dengan spasi ( )
        // .replace(/\+/g, ' ') juga menangani jika URL menggunakan tanda plus (+) untuk spasi
        const namaClean = namaRaw.replace(/_/g, ' ').replace(/\+/g, ' ');

        // Masukkan nama yang sudah bersih ke dalam elemen HTML
        const elemenNama = document.getElementById('nama-tamu');
        if (elemenNama) {
            elemenNama.innerText = namaClean;
        }
    }
    </script>
    
    
    <script src="./script.js"></script>

</body>
</html>
